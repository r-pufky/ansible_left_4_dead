---
# yamllint disable rule:line-length
###############################################################################
# Feature Flags
###############################################################################

# 1. Force Left 4 Dead server updates if already installed?
#
# Server will be updated during role application and as a pre-start task for
# service start. Disable to prevent updates after initial installation.
#
# Default: False.
left_4_dead_flg_update: false

# 2. Set configuration files? Default: True.
left_4_dead_flg_config: true

# 3. Enable Metamod installation?
#
# Install size: ~5MB
#
# Default: True.
left_4_dead_flg_metamod: true

# 4. Enable Sourcemod installation?
#
# Install size: ~200MB
#
# Enabling will automatically enable Metamod as a dependency.
#
# Default: True.
left_4_dead_flg_sourcemod: true

###############################################################################
# Service
###############################################################################

# Additional steamcmd options to use during app_update.
#
# Use 'validate' to checksum installed files for corruption.
#
# Default: [].
left_4_dead_srv_update_opts: []

# Server launch options.
#
# Command line options passed to dedicated server. Use only options that must
# be set for service to start. Place all other options in configuration files.
#
# Automatically configures service with: +console, +game, +exec, +pidfile.
#
# Default: [].
#   - '+map c1m1_hotel'
#   - '+port 27015'
#   - '+maxplayers 4'
#   - '+nohltv'
#
# Reference:
# * http://developer.valvesoftware.com/wiki/Command_line_options
left_4_dead_srv_launch_opts:
  - '+map c1m1_hotel'
  - '+port 27015'
  - '+maxplayers 4'
  - '+nohltv'

# Meta/Source Mod
###############################################################################
# Metamod and Sourcemod required matched branches to work correctly together.
#
# Reference:
# * https://www.sourcemm.net/downloads.php/?branch=stable
# * https://www.sourcemod.net/downloads.php?branch=stable

# Mod branch. Default: '1.12'.
left_4_dead_srv_mod_branch: '1.12'

# Metamod build. Default: '1219'.
left_4_dead_srv_mm_build: '1219'

# Sourcemod build. Default: '7223'.
left_4_dead_srv_sm_build: '7223'

###############################################################################
# Config
###############################################################################

# Host Message (host.txt).
#
# Contents for the HOST file. Generally these are very finicky and
# mis-documented throughout the web.
#
# Special Case:
#   * Use plain text.
#   * Use URL to HTTP only link, which will render the Host banner.
#
# Default: '' (disabled).
#
# Reference:
# * http://www.custwiki.cyberwurx.com/index.php/Using_host.txt_for_a_Server_Banner
left_4_dead_cfg_host: ''

# Message of the Day (motd.txt)
#
# Contents for the MOTD file. Generally these are very finicky and
# mis-documented throughout the web.
#
# Special Case:
#   * Use plain text.
#   * Use URL to HTTP only link, which will render the MOTD banner.
#
# Default: '' (disabled).
#
# Reference:
# * http://www.custwiki.cyberwurx.com/index.php/Using_host.txt_for_a_Server_Banner
left_4_dead_cfg_motd: ''

# Server Configuration (server.cfg)
#
# There are 4429 configuration options for Left 4 Dead. Reasonable default
# configuration provided below.
#
# Reference:
# * https://developer.valvesoftware.com/wiki/List_of_L4D_Cvars
left_4_dead_cfg_server:
  # Server
  hostname: 'L4D Server'
  sv_password: ''
  sv_allow_lobby_connect_only: 0
  sv_steamgroup: 0
  sv_steamgroup_exclusive: 0
  sv_search_key: 'L4D Server'
  sv_gametypes: 'coop,survival,versus,teamversus'
  rcon_password: ''
  sv_rcon_banpenalty: 360
  sv_rcon_log: 1
  sv_rcon_maxfailures: 3
  sv_rcon_minfailuretime: 600

  # General: Play
  motd_enabled: 1
  mp_disable_autokick: 1
  sv_allow_wait_command: 0
  sv_allowdownload: 0
  sv_allowupload: 0
  sv_alltalk: 0
  sv_alternateticks: 0
  sv_cheats: 0
  sv_consistency: 1
  sv_contact: ''
  sv_downloadurl: ''
  sv_pausable: 1
  sv_lan: 1
  sv_region: 1

  # Rate: settings
  sv_minrate: 40000  # Min bandwidth rate allowed on: server.
  sv_maxrate: 50000  # Max bandwidth rate allowed on: server.
  sv_mincmdrate: 0  # Minimum cmd rate (match server: tickrate).
  sv_maxcmdrate: 67  # Minimum cmd rate (match server: tickrate).

  # Server: Logging
  sv_log_onefile: 0
  sv_logbans: 1
  sv_logecho: 1
  sv_logfile: 1
  sv_logflush: 0  # Disable log to disk on each write (slow).
  sv_logsdir: 'logs'  # Logs folder relative to game directory.

# Sourcemod Simple Admins (admins_simple.ini)
#
# Simple admin privileges through Steam ID management.
#
# left_4_dead_cfg_admins:
#     list of dict - Server admin definitions.
#   - user: int - Steam64ID.
#     priv: str - Privilege string.
#
# left_4_dead_cfg_admins:
#   - user: 76561198021925108
#     priv: '99:z'  # Root privileges.
#
# Default: [] (disabled).
#
# Reference:
# * https://wiki.alliedmods.net/Adding_Admins_(SourceMod)
# * https://www.steamidfinder.com/
left_4_dead_cfg_admins: []
