---
###############################################################################
# Config
###############################################################################

- name: '{{ "Config | filesystem | set " ~ left_4_dead___app._motd }}'
  ansible.builtin.copy:
    dest: '{{ left_4_dead___app._motd }}'
    owner: '{{ steam__ctx._user }}'
    group: '{{ steam__ctx._group }}'
    mode: '0644'
    content: '{{ left_4_dead__cfg._motd }}'

- name: '{{ "Config | filesystem | set " ~ left_4_dead___app._host }}'
  ansible.builtin.copy:
    dest: '{{ left_4_dead___app._host }}'
    owner: '{{ steam__ctx._user }}'
    group: '{{ steam__ctx._group }}'
    mode: '0644'
    content: '{{ left_4_dead__cfg._host }}'

- name: '{{ "Config | filesystem | set " ~ left_4_dead___app._server }}'
  ansible.builtin.template:
    src: 'server.cfg.j2'
    dest: '{{ left_4_dead___app._server }}'
    owner: '{{ steam__ctx._user }}'
    group: '{{ steam__ctx._group }}'
    mode: '0644'
  vars:
    server: '{{ left_4_dead__cfg._server }}'

- name: '{{ "Config | filesystem | set " ~ left_4_dead__cfg._admin_ini }}'
  when: left_4_dead_flg_sourcemod
  ansible.builtin.template:
    src: 'admins_simple.ini.j2'
    dest: '{{ left_4_dead__cfg._admin_ini }}'
    owner: '{{ steam__ctx._user }}'
    group: '{{ steam__ctx._group }}'
    mode: '0600'
