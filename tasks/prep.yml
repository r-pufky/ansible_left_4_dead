---
###############################################################################
# Pre Execution Tasks
###############################################################################
# Only use data annotations in role after merging role, defaults, runtime data.
# Service may not exist if first install.

- name: 'Prep | fact | record start time'
  ansible.builtin.set_fact:
    left_4_dead__srv: "{{ left_4_dead___release | r_pufky.data.v3(

        _start=now(utc=True, fmt='%Y-%m-%dT%H%M%S'),
        _mod_branch=left_4_dead_srv_mod_branch,
        _mm_build=left_4_dead_srv_mm_build,
        _sm_build=left_4_dead_srv_sm_build,

        _update_opts=left_4_dead_srv_update_opts | join(' '),
        _launch_opts=left_4_dead_srv_launch_opts | join(' '),
      ) }}"
    left_4_dead__cfg: "{{ {} | r_pufky.data.v3(

        _host=left_4_dead_cfg_host,
        _motd=left_4_dead_cfg_motd,
        _server=left_4_dead_cfg_server,
        _admins=left_4_dead_cfg_admins,
      ) }}"

- name: 'Prep | assert | admins enabled and sourcemod installed'
  when: left_4_dead__cfg._admins | length > 0
  ansible.builtin.assert:
    quiet: true
    that:
      - left_4_dead_flg_sourcemod
    fail_msg: |

      ✘ Simple admins require sourcemod enabled.

      left_4_dead_flg_sourcemod: {{ left_4_dead_flg_sourcemod }}
      left_4_dead_cfg_admins: {{ left_4_dead__cfg._admins }}

- name: 'Prep | systemd | stop left_4_dead.service'
  ansible.builtin.systemd:
    name: 'left_4_dead.service'
    state: 'stopped'
  failed_when: false
